# pre-commit hooks 配置
# 安装：uv run pre-commit install
# 手动运行：uv run pre-commit run --all-files

repos:
  # Ruff：lint + format（替代 flake8 / isort / black）
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.8
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # 通用文件检查
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: \.min\.(js|css)$
      - id: end-of-file-fixer
        exclude: \.min\.(js|css)$
      - id: check-yaml
      - id: check-json
        exclude: (\.jsonc$|jsconfig\.json$)
      # TOML 语法校验：项目用 TOML 承载 pyproject.toml + config.toml(.default)，
      # check-yaml/check-json 之前漏了这一格式。
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      # 与 .gitattributes 的 `* text=auto eol=lf` 互补：让 pre-commit
      # 在提交前主动把 CRLF 收敛成 LF（Windows checkout 的常见漂移点），
      # 而不是只能 push 后等 CI 才发现。
      - id: mixed-line-ending
        args: [--fix=lf]
      # 防止 `breakpoint()` / `import pdb; pdb.set_trace()` / `pdb.run(...)`
      # 等调试残留进 commit。生产代码里出现一次会让运维 attach 不上正确的
      # stdin，且性能测试会因此 hang，影响面比 ruff 的语法 lint 更隐蔽。
      - id: debug-statements
      # 守 shebang ↔ 可执行位的双向契约：
      #   * `check-shebang-scripts-are-executable` —— 有 `#!` 的脚本（含
      #     scripts/run_coverage.sh）必须在 git index 里是 100755，否则
      #     `./scripts/run_coverage.sh` 会 EACCES。
      #   * `check-executables-have-shebangs` —— 反向：被 git 标 100755
      #     的文件如果没有 shebang，跨 OS clone 时 macOS / Linux 会按
      #     `binary` 启动失败。
      # 一同启用避免漂移到 v1.5.x 已经被咬过一次的"docs 写着可以
      # `./scripts/...` 但实际 mode 是 100644"那种 footgun。
      - id: check-shebang-scripts-are-executable
      - id: check-executables-have-shebangs
