# pre-commit hooks 配置
# 安装：uv run pre-commit install
# 手动运行：uv run pre-commit run --all-files

repos:
  # Ruff：lint + format（替代 flake8 / isort / black）
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.8
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # 通用文件检查
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: \.min\.(js|css)$
      - id: end-of-file-fixer
        exclude: \.min\.(js|css)$
      - id: check-yaml
      - id: check-json
        exclude: (\.jsonc$|jsconfig\.json$)
      # TOML 语法校验：项目用 TOML 承载 pyproject.toml + config.toml(.default)，
      # check-yaml/check-json 之前漏了这一格式。
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      # 与 .gitattributes 的 `* text=auto eol=lf` 互补：让 pre-commit
      # 在提交前主动把 CRLF 收敛成 LF（Windows checkout 的常见漂移点），
      # 而不是只能 push 后等 CI 才发现。
      - id: mixed-line-ending
        args: [--fix=lf]
      # 防止 `breakpoint()` / `import pdb; pdb.set_trace()` / `pdb.run(...)`
      # 等调试残留进 commit。生产代码里出现一次会让运维 attach 不上正确的
      # stdin，且性能测试会因此 hang，影响面比 ruff 的语法 lint 更隐蔽。
      - id: debug-statements
      # 守 shebang ↔ 可执行位的双向契约：
      #   * `check-shebang-scripts-are-executable` —— 有 `#!` 的脚本（含
      #     scripts/run_coverage.sh）必须在 git index 里是 100755，否则
      #     `./scripts/run_coverage.sh` 会 EACCES。
      #   * `check-executables-have-shebangs` —— 反向：被 git 标 100755
      #     的文件如果没有 shebang，跨 OS clone 时 macOS / Linux 会按
      #     `binary` 启动失败。
      # 一同启用避免漂移到 v1.5.x 已经被咬过一次的"docs 写着可以
      # `./scripts/...` 但实际 mode 是 100644"那种 footgun。
      - id: check-shebang-scripts-are-executable
      - id: check-executables-have-shebangs

  # R66：CSS 品牌色硬编码漂移检测器（local hook）。
  #
  # 背景：``src/ai_intervention_agent/static/css/main.css`` 里历史遗留
  # 34 处 ``rgba(0, 122, 255, X)``（iOS 系统蓝），与项目品牌色（dark
  # mode 紫 #a855f7 / light mode Anthropic Orange #d97757）不符。
  # R64/R65 先为 7 个高频组件加了 ``[data-theme='light']`` override，
  # 但底层硬编码替换风险大、推迟到后续 PR 渐进重构。本 hook 防止
  # 「PR 又新增更多 iOS 蓝硬编码」的倒退（参见
  # scripts/check_brand_color_consistency.py 的 docstring）。
  #
  # R88：R76 把 ``static/`` 从仓库根挪进 ``src/ai_intervention_agent/``
  # 包内（PyPA src/ 布局），原 ``files: ^static/css/...`` 与脚本默认
  # ``DEFAULT_ROOT = "static/css"`` 在新布局下都不再 match，hook 已
  # silently broken。修正后两者均指向新位置。
  #
  # ``--quiet`` 让 hook 在 baseline 通过时不输出，pre-commit 友好。
  - repo: local
    hooks:
      - id: check-brand-color-consistency
        name: CSS 品牌色硬编码漂移检测（R66 护栏）
        entry: uv run python scripts/check_brand_color_consistency.py --quiet
        language: system
        pass_filenames: false
        files: ^src/ai_intervention_agent/static/css/.*\.css$
        exclude: \.min\.css$

  # R174 / CR#10 F-1：CSS 字符串引号一致性漂移检测（local hook）。
  #
  # 背景：R169 commit ``73d9980`` 用 prettier 把 ``main.css`` 的字符串引号
  # 一次性收敛到 double-quote 一致风格。但仓库没有 prettier 配置，靠人工
  # 运行（一次性）。Code Review #10 F-1 标记了风险：后续 PR 可能再次引入
  # single-quote 字符串（``[data-theme='dark']`` / ``content: 'hello'`` 等）
  # 让 CSS 整洁度悄悄退化。
  #
  # 当前 baseline ``0`` 处违规 —— ``main.css`` 已经完全 double-quote。
  # 任何新增的"裸露" single-quote 字符串会 fail，强迫开发者用 double-quote
  # 写新代码（详见 scripts/check_css_quote_consistency.py 的 docstring）。
  #
  # 守门范围：``main.css`` + ``tri-state-panel.css``（R178 follow-up 把
  # tri-state-panel.css 21 处 attribute-selector 单引号收敛到双引号后，
  # 与 main.css 共享同一基线）。``prism.css`` 是上游 vendor 代码，
  # 始终排除在外。
  - repo: local
    hooks:
      - id: check-css-quote-consistency
        name: CSS 字符串引号一致性漂移检测（R174 护栏）
        entry: uv run python scripts/check_css_quote_consistency.py --quiet
        language: system
        pass_filenames: false
        files: ^src/ai_intervention_agent/static/css/(main|tri-state-panel)\.css$

  # R209 / Cycle 10 · F-release-2 (CR#22 §4 Important): pre-push hook
  # for release-tag-safety enforcement。
  #
  # 背景：R206 (cycle 9) 把 v1.7.2 docs-sync miss 经验固化成 13 步本地
  # 预飞行清单 + retag safety window 文档，但所有 13 步都靠**人**记得跑
  # ——一旦忘了步骤 6 (``scripts/check_tag_push_safety.py``), 4+ 个未推
  # 送 ``v*.*.*`` tag 累积时 ``git push --follow-tags`` 会静默触发
  # GitHub webhook 屏蔽 (R19.1, v1.5.24 真实复现), release.yml 一个 job
  # 都不跑。
  #
  # R209 把 ``check_tag_push_safety.py`` 装到 pre-push 阶段, push 触发
  # 时**自动跑** —— 这是 "用代码强制 R206 §1 step 6" 的工程化。开发者
  # 安装一次 (``make install-hooks`` 或 ``pre-commit install --hook-type
  # pre-push``)，后续 ``git push`` 都自动验证, 无需记得手跑。
  #
  # 性能：``check_tag_push_safety.py`` 1 次 ``git ls-remote`` (~50-500 ms
  # 视网络), 比 pytest / ruff 都快, 不影响 push 体验。
  #
  # 失败优雅降级：hook fail (exit 1) 时 push 被 abort, 开发者按脚本输出
  # 提示 (按 tag 名升序逐个 ``git push origin <tag>``) 修复后重试。绕过
  # 开关：``git push --no-verify`` (与 pre-commit 同款 escape hatch)。
  - repo: local
    hooks:
      - id: check-tag-push-safety
        name: Tag 推送前安全检查（R209 / F-release-2 护栏）
        entry: uv run python scripts/check_tag_push_safety.py
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true

  # CR#16 F-4：CHANGELOG.md 非-Unreleased 区段大幅 diff 检测。
  #
  # 背景：CR#16 期间发现 ``a37e17d`` 把 645 行的 markdownlint 自动格式化
  # 卷进 R185 feature commit，code review 时很难分辨 "feature 改动 vs
  # 历史段落 lint 重写"。本 hook 把这种"误捎带"在 pre-commit 阶段就拦住，
  # 强迫贡献者把格式化拆成独立 commit。
  #
  # 默认阈值 100 行；紧急绕过开关：脚本自身的 --allow-massive-changelog-
  # rewrite（不在 hook 里启用——commit message 中需要说明绕过理由时，
  # 维护者本地 ``git -c pre-commit.hook-args=...`` 或直接 ``--no-verify``
  # 同 commit message 解释）。
  - repo: local
    hooks:
      - id: check-changelog-diff-scope
        name: CHANGELOG.md 非-Unreleased 区段大幅 diff 检测（CR#16 F-4 护栏）
        entry: uv run python scripts/check_changelog_diff_scope.py
        language: system
        pass_filenames: false
        files: ^CHANGELOG\.md$

  # R219 / Cycle 11 · F-cycle10-3 护栏：CHANGELOG.md inline-code 风格。
  # R211 (Cycle 10) 一次性 normalize 了 363 个 reStructuredText 风格的
  # ``X`` 双反引号到 Markdown 标准 `X` 单反引号，本 hook 防回流：
  # 任何 ``X`` (X 不含反引号、不在 fenced block 内) 都会被报错并提
  # 示自动修复命令。配套 lint:
  #     uv run python scripts/check_changelog_inline_code_style.py
  #     uv run python scripts/check_changelog_inline_code_style.py --fix
  - repo: local
    hooks:
      - id: check-changelog-inline-code-style
        name: CHANGELOG.md 双反引号 inline-code 检测（R219 / F-cycle10-3 护栏）
        entry: uv run python scripts/check_changelog_inline_code_style.py
        language: system
        pass_filenames: false
        files: ^CHANGELOG\.md$

  # R236 / Cycle 15 · F-cycle14-1 护栏：ty 静态类型检查。
  #
  # 背景：``ty`` (astral-sh, mypy-spirit type checker) 之前只在 CI 跑
  # (``scripts/ci_gate.py`` 第 148 行)。v1.7.5 release (Cycle 13) 在
  # ``Release.yml`` 步骤 53 触发 ``ci_gate.py --ci`` 时被 ``ty`` 卡住——
  # ``tests/test_submit_btn_disabled_visible_invariant_r229.py`` 用了
  # ``self.assertIsNotNone(match)``, runtime 上完全正确, 但 ``ty`` (与
  # ``mypy``) **不识别**它做类型收缩 (type narrowing on ``re.Match | None``),
  # 报 ``unresolved-attribute``。导致 v1.7.5 tag 必须废弃 + v1.7.6
  # supersede + 浪费一次 release roundtrip。
  #
  # 根因分析: ``ty check`` 不在本地开发 loop 内, 开发者依赖 CI 抓 —— 但
  # CI 离 commit 已远, 反馈链很长 (5 min CI vs <1s 本地)。R226 已经把
  # precompress freshness 从 CI 提到 pre-commit, R236 复用同样模式把 ``ty``
  # 提到 pre-commit, 让所有 ``ty`` 错误在 ``git commit`` 时立刻 fail-closed
  # 而不是等 push → CI → 失败 → 反应。
  #
  # 性能: ``uv run ty check .`` 在当前代码量 (~50k LoC Python + tests) 约
  # 800-1200 ms (与 ruff 同档), 可接受。``ty`` 自带增量缓存, 二次更快。
  #
  # 触发: 任何 ``.py`` 改动 → 检查整个项目 (Python 模块互依赖, partial
  # 检查不可靠)。``pass_filenames: false`` 因 ``ty check .`` 已扫全部。
  #
  # 失败修复: 按 ``ty`` 输出修复类型错误。常见 footgun: 用
  # ``self.assertIsNotNone(x)`` (unittest) 而非 ``assert x is not None``
  # (PEP 484 标准 narrower), 后者 ty/mypy/pyright 都认。
  #
  # 绕过开关: ``git commit --no-verify`` (与其他 hook 同款 escape hatch)。
  - repo: local
    hooks:
      - id: ty-check
        name: ty 静态类型检查（R236 / F-cycle14-1 护栏，防 v1.7.5-style release 失败）
        entry: uv run ty check .
        language: system
        pass_filenames: false
        files: \.py$

  # R226 / Cycle 13 · F-cycle12-2 护栏：locale precompress 副本新鲜度。
  #
  # 背景：``src/ai_intervention_agent/static/locales/*.json`` 修改后必须
  # 同步重新生成对应的 ``.gz`` / ``.br`` 预压缩副本（``scripts/precompress_static.py``），
  # 否则生产服务器会继续 serve 旧版本字符串（Flask 优先服务 ``.br`` →
  # ``.gz``）。R223 在 ``fd2c069`` 给 ``settings.shortcutsFullHelpHint``
  # 加了新 i18n key 但**没有**重生预压缩副本——CI gate 捕获了漂移并在
  # R224 ``e8c9b94`` commit 顺手 bundle 回去。CR#25 §3 把该 footgun 标
  # 注为 F-cycle12-2 importance follow-up。
  #
  # 本 hook 把 ``precompress_static.py --check`` 提到 pre-commit 阶段：
  # 当 staged diff 触及任意 ``static/`` 资源（含 locale JSON）时立即
  # fail-closed，逼用户在 commit 前先跑 ``uv run python
  # scripts/precompress_static.py`` 同步副本。比"提交后等 ci_gate 抓"
  # 节省一次 push / CI roundtrip 时间。
  #
  # 性能：``--check`` 只读 + 解压 + byte 比较，不写盘；约 50–200 ms,
  # 与其他 hook 同档。
  #
  # 失败修复方式：脚本输出会提示运行 ``uv run python
  # scripts/precompress_static.py``（不带 ``--check``）来重生副本，
  # 然后 ``git add src/ai_intervention_agent/static/`` 重新 commit。
  - repo: local
    hooks:
      - id: check-static-precompress-fresh
        name: locale / 静态资源预压缩副本新鲜度（R226 / F-cycle12-2 护栏）
        entry: uv run python scripts/precompress_static.py --check
        language: system
        pass_filenames: false
        files: ^src/ai_intervention_agent/static/(css|js|locales)/

  # R242 / Cycle 16 · F-cycle15-9 护栏：``.min.js`` / ``.min.css``
  # 与源 ``.js`` / ``.css`` 内容漂移检测。
  #
  # 背景：``_get_minified_file()`` (web_ui.py L1387-1429) **优先 serve**
  # 同目录下的 ``.min.js`` / ``.min.css``（如果存在），意图是给本地开发
  # / VSCode extension 提供 parse-time 优化。但该函数只判定 "minified
  # 文件是否存在"，**不判定其新鲜度**：
  #
  #   - 开发者修改 ``app.js`` 之后, 如果不手动跑 ``minify_assets.py``,
  #     ``app.min.js`` 仍是修改前的旧内容
  #   - Flask 还是 serve 旧的 ``app.min.js`` (因为存在 → 选它)
  #   - 浏览器看到的是**旧代码**, 与 ``app.js`` 当前内容不一致
  #   - 在 R234/R238/R240/R241 实际命中过——开发本地一直跑着旧 a11y
  #     代码而不自知, 直到 R242 audit 才暴露
  #
  # 这与 R226 (precompress freshness) 是**同构**问题：
  #
  #   | 构建产物          | 出处                       | freshness 守护                  |
  #   | --------------- | ------------------------ | ----------------------------- |
  #   | ``.gz`` / ``.br`` | ``precompress_static.py`` | R226 pre-commit hook ✓        |
  #   | ``.min.js`` / ``.min.css`` | ``minify_assets.py``    | R242 pre-commit hook (本 hook) |
  #
  # 为什么 R226 当时漏了这个：R226 关注的是 "Flask 运行时优先 ``.br``
  # over ``.js``" 这条链路, 不知道还有第二条链路 "Flask 优先 ``.min.js``
  # over ``.js``" 也会复制同样的 footgun。R242 是 R226 的姊妹篇。
  #
  # ``.gitignore`` L267-274 把 ``*.min.js`` / ``*.min.css`` 排除在
  # tracked 文件之外, 所以 production fresh checkout 不存在 .min 文件
  # → ``_get_minified_file()`` fallback 回 ``.js``, 不受此 bug 影响。
  # **本 hook 主要保护开发者本地 dev loop**, 避免 "明明改了代码,
  # 浏览器 reload 看不到效果, 然后浪费半小时 debug"。
  #
  # 性能：``minify_assets.py --check`` 用 ``content_drifts()`` 内容比较
  # (避开 mtime 不稳定), 约 40-60 ms (rjsmin / rcssmin 都是 pure-Python
  # fast minifier), 比 R226 还快。
  #
  # 失败修复方式：脚本输出会提示运行 ``uv run python
  # scripts/minify_assets.py`` (不带 ``--check``) 来重生 .min 文件,
  # 然后 ``git add src/ai_intervention_agent/static/`` 重新 commit。
  #
  # 绕过开关：``git commit --no-verify``。
  - repo: local
    hooks:
      - id: check-static-minified-fresh
        name: 静态资源 .min.js / .min.css 新鲜度（R242 / F-cycle15-9 护栏）
        entry: uv run python scripts/minify_assets.py --check
        language: system
        pass_filenames: false
        files: ^src/ai_intervention_agent/static/(css|js)/.*\.(css|js)$

  # R246 / Cycle 17 · F-cycle16-build-artifact-uniform-guard 护栏：
  # 所有 generator 脚本的 ``--check`` flag 都提到 pre-commit 阶段。
  #
  # 背景：R226 (precompress freshness) + R242 (minify freshness) 之后,
  # ``ci_gate.py`` 里其实还有 3 个 ``--check``: ``gen_i18n_types``,
  # ``gen_pseudo_locale``, ``generate_docs``。它们都能 detect 同样形态的
  # "源改了 → generator 输出没跟上" stale-build 问题, 但只在 CI 阶段跑
  # 意味着每个开发者都要 push → 等 5 min → CI fail → 看 log → 跑脚本 →
  # 重 commit → 再 push。R226/R242 把这个 roundtrip 缩短到 commit 前
  # 立即 fail。R246 把同样的策略覆盖到剩下 4 个 generator——确保 build-
  # artifact freshness 矩阵 **完整 + 一致**。
  #
  # 矩阵 (after R246, 完整态):
  #
  #   | Generator script        | Producer output                          | pre-commit hook                 |
  #   | ----------------------- | ---------------------------------------- | ------------------------------- |
  #   | precompress_static.py   | ``static/**/*.{br,gz}``                  | R226 ``check-static-precompress-fresh`` ✓ |
  #   | minify_assets.py        | ``static/**/*.min.{js,css}``             | R242 ``check-static-minified-fresh`` ✓ |
  #   | gen_i18n_types.py       | ``packages/vscode/i18n-keys.d.ts``       | R246 ``check-i18n-types-fresh`` ✓ |
  #   | gen_pseudo_locale.py    | ``**/locales/_pseudo/pseudo.json``       | R246 ``check-pseudo-locale-fresh`` ✓ |
  #   | generate_docs.py        | ``docs/api/*.md`` + ``docs/api.zh-CN/*.md`` | R246 ``check-generated-docs-fresh`` ✓ |
  #   | generate_pwa_icons.py   | ``icons/*.png`` + ``icons/*.ico``        | R246 ``check-pwa-icons-fresh`` ✓ |
  #
  # 性能：4 个 hook 总耗时 ~900ms（gen_i18n_types ~40ms +
  # gen_pseudo_locale ~40ms + generate_docs en+zh ~180ms +
  # generate_pwa_icons ~620ms）。与 R236 ``ty check`` 同档可接受。
  #
  # 失败修复模式：每个 hook 失败消息会指向具体重生命令。
  - repo: local
    hooks:
      - id: check-i18n-types-fresh
        name: i18n TypeScript .d.ts 新鲜度（R246 / F-cycle16-build-artifact 矩阵）
        entry: uv run python scripts/gen_i18n_types.py --check
        language: system
        pass_filenames: false
        files: ^packages/vscode/locales/en\.json$
      - id: check-pseudo-locale-fresh
        name: pseudo locale 新鲜度（R246 / F-cycle16-build-artifact 矩阵）
        entry: uv run python scripts/gen_pseudo_locale.py --check
        language: system
        pass_filenames: false
        files: ^(src/ai_intervention_agent/static/locales|packages/vscode/locales)/.*\.json$
      - id: check-generated-docs-en-fresh
        name: 自动生成 API docs (en) 新鲜度（R246 / F-cycle16-build-artifact 矩阵）
        entry: uv run python scripts/generate_docs.py --lang en --check
        language: system
        pass_filenames: false
        files: ^src/ai_intervention_agent/.*\.py$
      - id: check-generated-docs-zh-fresh
        name: 自动生成 API docs (zh-CN) 新鲜度（R246 / F-cycle16-build-artifact 矩阵）
        entry: uv run python scripts/generate_docs.py --lang zh-CN --check
        language: system
        pass_filenames: false
        files: ^src/ai_intervention_agent/.*\.py$
      - id: check-pwa-icons-fresh
        name: PWA icons (PNG/ICO) 与源 SVG 新鲜度（R246 / F-cycle16-build-artifact 矩阵）
        entry: uv run python scripts/generate_pwa_icons.py --check
        language: system
        pass_filenames: false
        files: ^icons/
