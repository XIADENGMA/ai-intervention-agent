name: Dependabot Auto-Merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

env:
  # 提前验证 GitHub Actions 在 Node.js 24 运行时的兼容性（2026-06-02 起将成为默认）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dependabot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.actor == 'dependabot[bot]'
    steps:
      # 审计模式下 harden-runner 仅记录 egress，不 block；样本够了再切 block
      - name: Harden runner（audit）
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      # 用官方 fetch-metadata，替代以前手搓的 `gh pr view | parse semver` 脚本。
      # 好处：
      #   1. semver 解析 + 信号含 dependency-name / dependency-type / update-type 等，边界情况官方兜底；
      #   2. JS action 体量小，已用 SHA 固定，审计可复现；
      #   3. 支持 grouped updates（dependabot.yml 的 `groups:`），按最高 severity 返回 update-type。
      - name: 解析 Dependabot 升级类型
        id: metadata
        uses: dependabot/fetch-metadata@ffa630c65fa7e0ecfa0625b5ceda64399aea1b36 # v3.0.0

      - name: 自动合并低风险 Dependabot PR
        # 仅对 patch (Z) / minor (Y) 版本的依赖升级启用自动合并；
        # major (X) 升级始终人工 review，避免破坏性变更偷跑。
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
