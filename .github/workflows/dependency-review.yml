name: Dependency Review

on:
  pull_request:
    branches:
      - main

# 同一 PR 只保留最新一次运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # 提前验证 GitHub Actions 在 Node.js 24 运行时的兼容性（2026-06-02 起将成为默认）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  actions: read
  contents: read

jobs:
  review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      actions: read
      # 在 PR 上评论审查摘要
      pull-requests: write
      contents: read

    steps:
      # 审计模式下 harden-runner 仅记录 egress，不 block；样本够了再切 block
      - name: Harden runner（audit）
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 检出代码
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 依赖审查（vuln + license 拦截）
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # 引入 moderate 级及以上漏洞的 PR 直接 fail（PR gate）
          fail-on-severity: moderate
          # 仅在失败时贴评论，减少 noise；摘要同时写入 job summary
          comment-summary-in-pr: on-failure
