name: Dependency Review

on:
  pull_request:
    branches:
      - main

# 同一 PR 只保留最新一次运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # 提前验证 GitHub Actions 在 Node.js 24 运行时的兼容性（2026-06-02 起将成为默认）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      # 在 PR 上评论审查摘要
      pull-requests: write
      contents: read

    steps:
      # 审计模式下 harden-runner 仅记录 egress，不 block；样本够了再切 block
      - name: Harden runner（audit）
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: 检出代码
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 依赖审查（vuln + license 拦截）
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          # 引入 moderate 级及以上漏洞的 PR 直接 fail（PR gate）
          fail-on-severity: moderate
          # 仅在失败时贴评论，减少 noise；摘要同时写入 job summary
          comment-summary-in-pr: on-failure
