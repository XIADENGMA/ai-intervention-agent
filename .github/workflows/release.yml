name: Release

on:
  # 正式发布：推送语义化版本 tag（例如 v1.4.4）
  push:
    tags:
      - "v*.*.*"

  # 手动触发：默认只构建并上传产物（不发布/不创建 Release）
  workflow_dispatch:

permissions:
  contents: read

env:
  # 提前验证 GitHub Actions 在 Node.js 24 运行时的兼容性（2026-06-02 起将成为默认）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (sdist + wheel)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 审计模式下 harden-runner 仅记录 egress，不 block；样本够了再切 block
      - name: Harden runner（audit）
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: 检出代码
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 设置 Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: 安装 uv（带缓存）
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: 版本一致性检查（bump_version.py --check）
        run: uv run python scripts/bump_version.py --check

      - name: Python CI Gate（ruff/ty/pytest/minify）
        run: uv run python scripts/ci_gate.py --ci

      - name: 构建（uv build）
        run: uv build --sdist --wheel --out-dir dist --clear

      - name: 校验产物（twine check）
        run: uv tool run twine check dist/*

      - name: 设置 Node.js（用于构建 VSCode 插件 VSIX）
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: 安装 Node 依赖（npm workspaces）
        run: npm ci

      - name: 构建 VSCode 插件 VSIX
        run: npm run vscode:package

      - name: 上传构建产物
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

      - name: 上传 VSCode 插件产物（VSIX）
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vsix
          path: packages/vscode/*.vsix
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish to PyPI (Trusted Publisher)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    # 仅在 tag push 时发布；workflow_dispatch 默认不发布，避免误操作
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/project/ai-intervention-agent/

    steps:
      # 审计模式下 harden-runner 仅记录 egress，不 block；样本够了再切 block
      - name: Harden runner（audit）
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: 下载构建产物
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: 发布到 PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    timeout-minutes: 10

    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      # 审计模式下 harden-runner 仅记录 egress，不 block；样本够了再切 block
      - name: Harden runner（audit）
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: 检出代码（用于生成 Release Notes）
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: 下载构建产物
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: 下载 VSCode 插件产物（VSIX）
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vsix
          path: vsix/

      - name: 创建 GitHub Release（附带产物）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"

          prerelease_flag=""
          if [[ "$tag" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi

          # 如果 Release 不存在则创建；存在则仅上传/覆盖产物（避免 tag 重跑导致失败）
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* vsix/*.vsix --clobber
          else
            gh release create "$tag" dist/* vsix/*.vsix --title "$tag" --generate-notes $prerelease_flag
          fi

  vscode-marketplace:
    name: Publish VSCode Extension to VS Code Marketplace
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      # 审计模式下 harden-runner 仅记录 egress，不 block；样本够了再切 block
      - name: Harden runner（audit）
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: 下载 VSCode 插件产物（VSIX）
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vsix
          path: vsix/

      - name: 设置 Node.js（用于发布 Marketplace）
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"

      - name: 发布到 VS Code Marketplace
        if: env.VSCE_PAT != ''
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce publish --pat "$VSCE_PAT" --packagePath vsix/*.vsix

      - name: 跳过（VSCE_PAT 未配置）
        if: env.VSCE_PAT == ''
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: echo "::warning::VSCE_PAT secret not configured, skipping VS Code Marketplace publish"

  open-vsx:
    name: Publish VSCode Extension to Open VSX
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      # 审计模式下 harden-runner 仅记录 egress，不 block；样本够了再切 block
      - name: Harden runner（audit）
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: 下载 VSCode 插件产物（VSIX）
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vsix
          path: vsix/

      - name: 设置 Node.js（用于发布 Open VSX）
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"

      - name: 发布到 Open VSX（从 VSIX 发布）
        if: env.OVSX_TOKEN != ''
        env:
          OVSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
        run: |
          npx --yes ovsx verify-pat xiadengma -p "$OVSX_TOKEN"
          npx --yes ovsx publish -p "$OVSX_TOKEN" vsix/*.vsix

      - name: 跳过（OPEN_VSX_TOKEN 未配置）
        if: env.OVSX_TOKEN == ''
        env:
          OVSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
        run: echo "::warning::OPEN_VSX_TOKEN secret not configured, skipping Open VSX publish"
