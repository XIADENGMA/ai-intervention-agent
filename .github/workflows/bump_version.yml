name: Bump Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version to bump to (e.g. 1.5.6)'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 默认 read-only，只有 bump-version job 需要 `contents: write`；
# 缩小权限面积以满足 OSSF Scorecard Token-Permissions 检查。
permissions:
  actions: read
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bump-version:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
      # 仅本 job 需要推 commit；其他（未来）job 默认 read-only
      contents: write
    steps:
      # 审计模式下 harden-runner 仅记录 egress，不 block；样本够了再切 block
      - name: Harden runner（audit）
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 检出代码
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 设置 Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: 安装 uv（带缓存）
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.9"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: 执行版本号同步
        run: uv run python scripts/bump_version.py ${{ inputs.version }}

      # bump_version.py 内部已做跨文件写入，再跑一次 --check 等于冗余校验：
      # 任何文件漏刷、被其他工具回滚、手工输入错位，这一步都能立即失败，
      # 避免不一致版本号被提交进 main。
      - name: 版本一致性复核（bump_version.py --check）
        run: uv run python scripts/bump_version.py --check

      - name: 提交并推送
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m ":wrench: chore: bump version to ${{ inputs.version }}"
          git push
