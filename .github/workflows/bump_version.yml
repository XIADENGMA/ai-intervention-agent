name: Bump Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version to bump to (e.g. 1.5.6)'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 默认 read-only，只有 bump-version job 需要 `contents: write`；
# 缩小权限面积以满足 OSSF Scorecard Token-Permissions 检查。
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bump-version:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      # 仅本 job 需要推 commit；其他（未来）job 默认 read-only
      contents: write
    steps:
      # 审计模式下 harden-runner 仅记录 egress，不 block；样本够了再切 block
      - name: Harden runner（audit）
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: 检出代码
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 设置 Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: 安装 uv（带缓存）
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.9"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: 执行版本号同步
        run: uv run python scripts/bump_version.py ${{ inputs.version }}

      # bump_version.py 内部已做跨文件写入，再跑一次 --check 等于冗余校验：
      # 任何文件漏刷、被其他工具回滚、手工输入错位，这一步都能立即失败，
      # 避免不一致版本号被提交进 main。
      - name: 版本一致性复核（bump_version.py --check）
        run: uv run python scripts/bump_version.py --check

      - name: 提交并推送
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m ":wrench: chore: bump version to ${{ inputs.version }}"
          git push
