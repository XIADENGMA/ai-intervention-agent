name: Bump Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version to bump to (e.g. 1.5.6)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Run bump_version.py
        run: uv run python scripts/bump_version.py ${{ inputs.version }}

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m ":wrench: chore: bump version to ${{ inputs.version }}"
          git push
