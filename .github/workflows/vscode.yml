name: VSCode Extension (Lint/Test)

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*.*.*"
    paths:
      - "packages/vscode/**"
      - "scripts/package_vscode_vsix.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/vscode.yml"
  pull_request:
    branches:
      - main
    paths:
      - "packages/vscode/**"
      - "scripts/package_vscode_vsix.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/vscode.yml"
  workflow_dispatch:

# 同一分支只保留最新一次运行，避免排队浪费
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # 提前验证 GitHub Actions 在 Node.js 24 运行时的兼容性（2026-06-02 起将成为默认）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  vscode:
    name: VSCode (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      # harden-runner 仅支持 Linux GitHub-hosted runner；macOS 矩阵行静默跳过
      - name: Harden runner（audit）
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: 检出代码
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 设置 Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: 安装依赖（npm workspaces）
        run: npm ci

      - name: 缓存 VSCode Test 下载（.vscode-test）
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/vscode/.vscode-test
          key: vscode-test-${{ runner.os }}-1.110.0

      - name: VSCode 插件：Lint
        run: npm run vscode:lint

      - name: 安装 xvfb（Linux 无头环境需要）
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: VSCode 插件：Test（Linux）
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run vscode:test

      - name: VSCode 插件：Test（macOS）
        if: runner.os == 'macOS'
        run: npm run vscode:test

      - name: VSCode 插件：Package VSIX
        run: npm run vscode:package

      - name: 上传 VSIX 产物
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ai-intervention-agent-vsix-${{ matrix.os }}
          path: packages/vscode/*.vsix
          if-no-files-found: error
