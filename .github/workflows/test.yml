name: Tests

on:
  push:
    branches:
      - main
      - develop
    # R181 — 删除 docs/** 与 **/*.md 的 paths-ignore：
    # 这两条原本是 "doc-only commits 不跑 CI" 的优化，但 v1.6.3 release
    # 失败暴露了一个隐藏成本：CHANGELOG.md 改动可以破坏 test_housekeeping_r151
    # / test_changelog_* 等 doc-aware guards，docs/*.md 改动可以破坏
    # test_docs_links_no_rot / test_generate_docs_index_prefix_r178 等。让
    # doc-only commit 仍跑完整 ci_gate.py（5 min / matrix）。LICENSE 与
    # ISSUE_TEMPLATE 没有 pytest guard，继续 ignore。
    paths-ignore:
      - ".github/ISSUE_TEMPLATE/**"
      - "LICENSE"
  pull_request:
    branches:
      - main
    paths-ignore:
      - ".github/ISSUE_TEMPLATE/**"
      - "LICENSE"
  workflow_dispatch:

# 同一分支只保留最新一次运行，避免排队浪费
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # 提前验证 GitHub Actions 在 Node.js 24 运行时的兼容性（2026-06-02 起将成为默认）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  actions: read
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      # 审计模式下 harden-runner 仅记录 egress，不 block；样本够了再切 block
      - name: Harden runner（audit）
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 检出代码
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 设置 Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: 安装 uv（带缓存）
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.11.9"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: 版本一致性检查（bump_version.py --check）
        if: matrix.python-version == '3.11'
        run: uv run python scripts/bump_version.py --check

      - name: Python CI Gate（ruff/ty/pytest/coverage/minify）
        run: uv run python scripts/ci_gate.py --ci --with-coverage

      - name: 上传覆盖率报告（coverage.xml）
        if: always() && matrix.python-version == '3.11'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: error
