name: Tests

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - "LICENSE"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - "LICENSE"
  workflow_dispatch:

# 同一分支只保留最新一次运行，避免排队浪费
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # 提前验证 GitHub Actions 在 Node.js 24 运行时的兼容性（2026-06-02 起将成为默认）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: 检出代码
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 设置 Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: 安装 uv（带缓存）
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: 同步依赖（含 dev 组，严格使用 uv.lock）
        run: uv sync --all-groups --frozen

      - name: 版本一致性检查（bump_version.py --check）
        if: matrix.python-version == '3.11'
        run: |
          set -euo pipefail
          VERSION="$(uv run python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])")"
          uv run python scripts/bump_version.py "$VERSION" --check

      - name: Ruff（Lint）
        run: uv run ruff check .

      - name: Ruff（Format Check）
        run: uv run ruff format --check .

      - name: Ty（Type Check）
        run: uv run ty check .

      - name: Pytest（含覆盖率）
        run: uv run pytest -q --cov=. --cov-report=xml --cov-report=term-missing

      - name: 生成静态资源压缩文件（.min 文件）
        run: uv run python scripts/minify_assets.py --force

      - name: 上传覆盖率报告（coverage.xml）
        if: always() && matrix.python-version == '3.11'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: warn
